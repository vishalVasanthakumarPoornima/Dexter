profile:
  name:
  email:
  phone:
  location:
  github:
  linkedin:
  portfolio:
  resume_path:
  work_authorization:
  sponsorship_needed:

targets:
  roles:
    - Software Engineer Intern
    - AI Engineer Intern
    - Security Engineer Intern
    - Backend Engineer Intern
  locations:
    - Remote
    - Bay Area
    - San Jose
    - San Francisco
    - Fremont
  include_remote: true
  include_hybrid: true
  include_onsite: true
  employment_types:
    - internship
    - new_grad
    - full_time

limits:
  max_jobs_per_source: 100
  max_ranked_jobs: 50
  max_application_packets_per_run: 10
  max_apply_sessions_per_day: 5

safety:
  auto_submit: false
  require_approval_before_submit: true
  restricted_sources_manual_only: true
  captcha_bypass: false

sources:
  greenhouse:
    enabled: true
    companies: []
  lever:
    enabled: true
    companies: []
  usajobs:
    enabled: false
    api_key_env: USAJOBS_API_KEY
    email_env: USAJOBS_EMAIL
  adzuna:
    enabled: false
    app_id_env: ADZUNA_APP_ID
    app_key_env: ADZUNA_APP_KEY
  remotive:
    enabled: true
  ashby:
    enabled: true
    boards: []
  smartrecruiters:
    enabled: true
    companies: []
  recruitee:
    enabled: true
    companies: []
  themuse:
    enabled: true
    categories: []
  arbeitnow:
    enabled: true
  careerjet:
    enabled: false
    api_key_env: CAREERJET_API_KEY
    locale_code: en_US
  jooble:
    enabled: false
    api_key_env: JOOBLE_API_KEY
  brave_search:
    enabled: false
    api_key_env: BRAVE_SEARCH_API_KEY
    queries: []
  github_lists:
    enabled: true
    repos:
      - https://github.com/SimplifyJobs/Summer2026-Internships
      - https://github.com/SimplifyJobs/New-Grad-Positions
      - https://github.com/SpeedyApply/2026-SWE-College-Jobs
      - https://github.com/pittcsc/Summer2026-Internships
      - https://github.com/vanshb03/Summer2027-Internships
  rss:
    enabled: true
    feeds: []
  manual_link:
    enabled: true
  company_careers:
    enabled: true
    companies: []
  web_discovery:
    enabled: true
    queries: []
  restricted_manual:
    enabled: true
    domains:
      - linkedin.com
      - indeed.com
      - glassdoor.com
