<!doctype html>
<html>
  <head><title>Dexter Fake Application</title></head>
  <body>
    <form id="application">
      <label>Full Name <input id="full_name" name="full_name" /></label>
      <label>Email <input id="email" name="email" type="email" /></label>
      <label>Phone <input id="phone" name="phone" /></label>
      <label>Location <input id="location" name="location" /></label>
      <label>LinkedIn <input id="linkedin" name="linkedin" /></label>
      <label>GitHub <input id="github" name="github" /></label>
      <label>Resume <input id="resume" name="resume" type="file" /></label>
      <label>Are you authorized to work? <select id="work_authorization" name="work_authorization"><option></option><option>Yes</option><option>No</option></select></label>
      <label>Will you require sponsorship? <select id="sponsorship" name="sponsorship"><option></option><option>Yes</option><option>No</option></select></label>
      <button type="submit" id="submit_application">Submit Application</button>
    </form>
  </body>
</html>
